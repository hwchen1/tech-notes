        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        /* Theme variables */
        :root {
            --bg: #f8fafc;
            --bg2: rgba(255,255,255,0.85);
            --bg3: rgba(241,245,249,0.9);
            --border: rgba(71,85,105,0.12);
            --text: #1e293b;
            --text2: #475569;
            --text3: #94a3b8;
            --card-bg: rgba(255,255,255,0.92);
            --zone-bg: rgba(99,102,241,0.03);
            --header-bg: rgba(248,250,252,0.95);
            --tip-bg: rgba(255,255,255,0.97);
            --rl-bg: rgba(255,255,255,0.92);
        }
        :root.dark {
            --bg: #0b1120;
            --bg2: rgba(15,23,42,0.85);
            --bg3: rgba(30,41,59,0.9);
            --border: rgba(148,163,184,0.12);
            --text: #e2e8f0;
            --text2: #94a3b8;
            --text3: #64748b;
            --card-bg: rgba(15,23,42,0.85);
            --zone-bg: rgba(99,102,241,0.015);
            --header-bg: rgba(11,17,32,0.95);
            --tip-bg: rgba(11,17,32,0.97);
            --rl-bg: rgba(11,17,32,0.92);
        }
        .layout { display: flex; flex-direction: column; height: 100vh; }

        header {
            flex-shrink: 0;
            padding: 8px 24px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        header h1 {
            font-size: 18px; font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #0ea5e9, #10b981);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2); color: #6366f1; }
        .theme-btn {
            margin-left: auto;
            padding: 4px 12px; border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text2);
            font-size: 11px; cursor: pointer;
            transition: all 0.2s;
        }
        .theme-btn:hover { border-color: #6366f1; color: #6366f1; }

        .main { flex: 1; position: relative; overflow: hidden; }

        /* SVG ABOVE cards so lines are never hidden */
        .svg-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 20;
        }

        .zone { position: absolute; border-radius: 10px; border: 1px solid; z-index: 0; }
        .zone-up { left: 0.5%; top: 0.5%; width: 49%; height: 98.5%; background: var(--zone-bg); border-color: var(--border); }
        .zone-mid { left: 50.5%; top: 0.5%; width: 14%; height: 98.5%; background: var(--zone-bg); border-color: var(--border); }
        .zone-right { left: 65.5%; top: 0.5%; width: 34%; height: 98.5%; background: var(--zone-bg); border-color: var(--border); }

        .zone-title {
            position: absolute; z-index: 3;
            font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
            padding: 3px 9px; border-radius: 4px;
        }

        /* Cards */
        .card {
            position: absolute;
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 7px 9px;
            background: var(--card-bg);
            z-index: 4;
            transition: all 0.15s ease;
            cursor: default;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .card:hover {
            z-index: 12;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .card-hdr { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; flex-shrink: 0; }
        .card-icon { font-size: 16px; }
        .card-name { font-size: 14px; font-weight: 700; }
        .card-desc { font-size: 11px; color: var(--text3); margin-bottom: 5px; flex-shrink: 0; line-height: 1.3; }
        .card-chips { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; align-content: flex-start; }
        .c {
            font-size: 13px; padding: 3px 8px; border-radius: 5px;
            border: 1px solid; cursor: pointer; transition: all 0.12s;
            white-space: nowrap; font-weight: 500;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .c:hover { transform: scale(1.06); z-index: 20; position: relative; }
        .c .rank {
            font-size: 10px; font-weight: 700; min-width: 16px; height: 16px;
            border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
            flex-shrink: 0; opacity: 0.9;
            background: rgba(255,255,255,0.12); color: inherit;
        }
        .c img {
            width: 16px; height: 16px; border-radius: 3px;
            object-fit: contain; flex-shrink: 0;
        }
        .c .logo-letter {
            width: 16px; height: 16px; border-radius: 3px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 700; flex-shrink: 0;
            color: #fff; opacity: 0.9;
        }

        .card.mid-card .card-name { font-size: 15px; }
        .card.mid-card .c { font-size: 14px; padding: 4px 10px; }
        .card.mid-card .c img, .card.mid-card .c .logo-letter { width: 18px; height: 18px; }
        .card.down-card .card-name { font-size: 14px; }
        .card.down-card .c { font-size: 13px; padding: 3px 8px; }

        /* SVG lines - HIDDEN by default, show only on hover */
        .rel { fill: none; stroke-width: 1.6; stroke-dasharray: 5 3; opacity: 0; transition: all 0.25s; }
        .rel.hi { opacity: 0.9; stroke-width: 2.5; stroke-dasharray: none; filter: drop-shadow(0 0 4px currentColor); }
        .flow { fill: none; stroke-width: 1.8; opacity: 0; stroke-dasharray: 4 2; transition: opacity 0.25s, stroke-dasharray 0.25s; }
        .flow.hi { opacity: 0.8; stroke-dasharray: none; }
        .flow-main { fill: none; stroke-width: 3; opacity: 0; transition: opacity 0.25s; }
        .flow-main.hi { opacity: 0.85; }

        .rl {
            position: absolute; z-index: 21;
            font-size: 10px; padding: 2px 6px; border-radius: 3px;
            background: var(--rl-bg); border: 1px solid var(--border);
            color: var(--text2); white-space: nowrap; pointer-events: none;
            opacity: 0; transition: opacity 0.25s;
        }
        .rl.hi { opacity: 1; }

        .fl {
            position: absolute; z-index: 21;
            font-size: 10px; padding: 2px 6px; border-radius: 3px;
            background: var(--rl-bg);
            color: var(--text3); white-space: nowrap; pointer-events: none;
            opacity: 0; transition: opacity 0.25s;
        }
        .fl.hi { opacity: 1; }

        .tip {
            position: fixed; z-index: 9999;
            background: var(--tip-bg);
            border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 14px;
            font-size: 13px; line-height: 1.5;
            max-width: 280px; pointer-events: none;
            opacity: 0; transform: translateY(3px);
            transition: all 0.12s ease;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            color: var(--text);
        }
        .tip.show { opacity: 1; transform: translateY(0); }
        .tip b { display: block; margin-bottom: 2px; font-size: 14px; }
        .tip .d { color: var(--text2); font-size: 12px; }
        .tip .m { margin-top: 3px; font-size: 11px; padding-top: 3px; border-top: 1px solid var(--border); }
    </style>
</head>

function hexRgba(hex,a){return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;}
function showTip(e,c,color){
    tip.innerHTML=`<b style="color:${color}">${c.n}</b><div class="d">${c.d}</div><div class="m" style="color:${color}">${c.m}</div>`;
    tip.classList.add('show');
    tip.style.left=Math.min(e.clientX+10,window.innerWidth-300)+'px';
    tip.style.top=Math.min(e.clientY+10,window.innerHeight-80)+'px';
}
function hideTip(){tip.classList.remove('show');}

function getLogoImg(name, color) {
    const info = logoMap[name] || {};
    const bg = info.bg || '#334155';
    const letter = name.charAt(0);
    if (info.url) {
        // Try favicon, fallback to letter
        return `<img src="${info.url}" onerror="this.outerHTML='<span class=\\'logo-letter\\' style=\\'background:${bg}\\'>${letter}</span>'" alt="">`;
    }
    return `<span class="logo-letter" style="background:${bg}">${letter}</span>`;
}

function makeCard(d,p,cls=''){
    const card=document.createElement('div');
    card.className='card '+cls;
    card.id='c-'+d.id;
    card.style.left=p[0]+'%';card.style.top=p[1]+'%';
    card.style.width=p[2]+'%';card.style.height=p[3]+'%';
    card.style.borderColor=d.color+'30';

    let chipsHtml=d.co.map((c,idx)=>
        `<span class="c" style="border-color:${d.color}30;color:${d.color};background:${hexRgba(d.color,0.06)}" data-d='${JSON.stringify(c).replace(/'/g,"&#39;")}'><span class="rank">${idx+1}</span>${getLogoImg(c.n,d.color)}${c.n}</span>`
    ).join('');
    card.innerHTML=`<div class="card-hdr"><span class="card-icon">${d.icon}</span><span class="card-name" style="color:${d.color}">${d.name}</span></div><div class="card-desc">${d.desc}</div><div class="card-chips">${chipsHtml}</div>`;

    card.querySelectorAll('.c').forEach(chip=>{
        const c=JSON.parse(chip.dataset.d.replace(/&#39;/g,"'"));
        chip.onmouseenter=e=>{chip.style.background=hexRgba(d.color,0.22);chip.style.borderColor=d.color;chip.style.boxShadow=`0 2px 10px ${hexRgba(d.color,0.3)}`;showTip(e,c,d.color);};
        chip.onmousemove=e=>{tip.style.left=Math.min(e.clientX+10,window.innerWidth-300)+'px';tip.style.top=Math.min(e.clientY+10,window.innerHeight-80)+'px';};
        chip.onmouseleave=()=>{chip.style.background=hexRgba(d.color,0.06);chip.style.borderColor=d.color+'30';chip.style.boxShadow='';hideTip();};
    });

    card.addEventListener('mouseenter',()=>{card.style.borderColor=d.color+'90';card.style.boxShadow=`0 0 20px ${hexRgba(d.color,0.15)}`;hiRels(d.id);});
    card.addEventListener('mouseleave',()=>{card.style.borderColor=d.color+'30';card.style.boxShadow='';loRels();});

    main.appendChild(card);
}

supLabel.textContent='支撑层';
main.appendChild(supLabel);

const relPaths=[];
const relLabels=[];
const flowPaths=[];
const flowLabelsEls=[];

function drawAll(){
    const w=main.clientWidth,h=main.clientHeight;
    svg.setAttribute('width',w);svg.setAttribute('height',h);
    svg.innerHTML='';
    document.querySelectorAll('.rl,.fl').forEach(e=>e.remove());
    relPaths.length=0;relLabels.length=0;
    flowPaths.length=0;flowLabelsEls.length=0;

    const defs=document.createElementNS(NS,'defs');
    svg.appendChild(defs);

    function mkMarker(id,color){
        const m=document.createElementNS(NS,'marker');
        m.setAttribute('id',id);m.setAttribute('markerWidth','12');m.setAttribute('markerHeight','8');
        m.setAttribute('refX','0');m.setAttribute('refY','4');m.setAttribute('orient','auto');
        m.setAttribute('markerUnits','userSpaceOnUse');
        const p=document.createElementNS(NS,'polygon');
        p.setAttribute('points','0 0, 12 4, 0 8');p.setAttribute('fill',color);
        m.appendChild(p);defs.appendChild(m);
    }

    function getEl(id){return document.getElementById('c-'+id);}
    function cardRight(id){const el=getEl(id);return{x:el.offsetLeft+el.offsetWidth,y:el.offsetTop+el.offsetHeight/2};}
    function cardLeft(id){const el=getEl(id);return{x:el.offsetLeft,y:el.offsetTop+el.offsetHeight/2};}
    function cardTop(id){const el=getEl(id);return{x:el.offsetLeft+el.offsetWidth/2,y:el.offsetTop};}
    function cardBottom(id){const el=getEl(id);return{x:el.offsetLeft+el.offsetWidth/2,y:el.offsetTop+el.offsetHeight};}

    // 1. Upstream internal relations (right-side arcs)
    upRels.forEach((rel,i)=>{
        const fromEl=getEl(rel.from),toEl=getEl(rel.to);
        const from={x:fromEl.offsetLeft+fromEl.offsetWidth,y:fromEl.offsetTop+fromEl.offsetHeight/2};
        const to={x:toEl.offsetLeft+toEl.offsetWidth,y:toEl.offsetTop+toEl.offsetHeight/2};
        const midY=(from.y+to.y)/2;
        const dist=Math.abs(from.y-to.y);
        const bulge=from.x+12+dist*0.1+i*3;

        const srcMod=data.upstream.find(u=>u.id===rel.from);
        mkMarker(`r${i}`,srcMod.color);
        const path=document.createElementNS(NS,'path');
        path.setAttribute('d',`M${from.x} ${from.y} C${bulge} ${from.y}, ${bulge} ${to.y}, ${to.x} ${to.y}`);
        path.setAttribute('class','rel');
        path.setAttribute('stroke',srcMod.color);
        path.setAttribute('marker-end',`url(#r${i})`);
        path.dataset.from=rel.from;path.dataset.to=rel.to;
        svg.appendChild(path);
        relPaths.push(path);

        const lbl=document.createElement('div');
        lbl.className='rl';
        lbl.style.left=(bulge+3)+'px';
        lbl.style.top=(midY-8)+'px';
        lbl.style.color=srcMod.color;
        lbl.textContent=rel.label;
        lbl.dataset.from=rel.from;lbl.dataset.to=rel.to;
        main.appendChild(lbl);
        relLabels.push(lbl);
    });

    // 2. Upstream → Mid (flow arrows - from upstream right to mid left)
    const midEl=getEl('mid');
    data.upstream.forEach((mod,i)=>{
        const from=cardRight(mod.id);
        const toY=midEl.offsetTop+25+i*((midEl.offsetHeight-50)/(data.upstream.length-1));
        const to={x:midEl.offsetLeft,y:toY};

        mkMarker(`f${mod.id}`,mod.color);
        const path=document.createElementNS(NS,'path');
        path.setAttribute('d',`M${from.x} ${from.y} C${from.x+18} ${from.y}, ${to.x-18} ${to.y}, ${to.x} ${to.y}`);
        path.setAttribute('class','flow');
        path.setAttribute('stroke',mod.color);
        path.setAttribute('marker-end',`url(#f${mod.id})`);
        path.dataset.from=mod.id;path.dataset.to='mid';
        svg.appendChild(path);
        flowPaths.push(path);

        const lbl=document.createElement('div');
        lbl.className='fl';
        lbl.style.left=((from.x+to.x)/2-20)+'px';
        lbl.style.top=((from.y+to.y)/2-7)+'px';
        lbl.style.color=mod.color;
        lbl.textContent=flowLabels[i].text;
        lbl.dataset.from=mod.id;lbl.dataset.to='mid';
        main.appendChild(lbl);
        flowLabelsEls.push(lbl);
    });

    // 3. Mid → Down (from mid top-right corner to down left)
    {
        const midR=getEl('mid');
        const from={x:midR.offsetLeft+midR.offsetWidth, y:midR.offsetTop+midR.offsetHeight*0.25};
        const to=cardLeft('down');
        mkMarker('fmd','#818cf8');
        const path=document.createElementNS(NS,'path');
        path.setAttribute('d',`M${from.x} ${from.y} C${from.x+35} ${from.y}, ${to.x-35} ${to.y}, ${to.x} ${to.y}`);
        path.setAttribute('class','flow-main');
        path.setAttribute('stroke','#818cf8');
        path.setAttribute('marker-end','url(#fmd)');
        path.dataset.from='mid';path.dataset.to='down';
        svg.appendChild(path);
        flowPaths.push(path);

        const lbl=document.createElement('div');
        lbl.className='fl';
        lbl.style.left=((from.x+to.x)/2-18)+'px';
        lbl.style.top=((from.y+to.y)/2-8)+'px';
        lbl.style.color='#818cf8';
        lbl.style.fontSize='11px';
        lbl.textContent='整机→部署';
        lbl.dataset.from='mid';lbl.dataset.to='down';
        main.appendChild(lbl);
        flowLabelsEls.push(lbl);
    }

    // 4. Support → Mid (from support left to mid bottom-right, routed ABOVE mid card)
    data.support.forEach((s,i)=>{
        const sEl=getEl(s.id);
        const from={x:sEl.offsetLeft, y:sEl.offsetTop+sEl.offsetHeight/2};
        const midR=getEl('mid');
        const to={x:midR.offsetLeft+midR.offsetWidth, y:midR.offsetTop+midR.offsetHeight*(0.55+i*0.12)};

        mkMarker(`s${s.id}`,s.color);
        const path=document.createElementNS(NS,'path');
        path.setAttribute('d',`M${from.x} ${from.y} C${from.x-35} ${from.y}, ${to.x+35} ${to.y}, ${to.x} ${to.y}`);
        path.setAttribute('class','flow');
        path.setAttribute('stroke',s.color);
        path.setAttribute('marker-end',`url(#s${s.id})`);
        path.dataset.from=s.id;path.dataset.to='mid';
        svg.appendChild(path);
        flowPaths.push(path);

        const lbl=document.createElement('div');
        lbl.className='fl';
        const mx=(from.x+to.x)/2-20, my=(from.y+to.y)/2-7;
        lbl.style.left=mx+'px'; lbl.style.top=my+'px';
        lbl.style.color=s.color;
        lbl.textContent=s.name+'→整机';
        lbl.dataset.from=s.id;lbl.dataset.to='mid';
        main.appendChild(lbl);
        flowLabelsEls.push(lbl);
    });

    // 5. Support → Down (short vertical)
    data.support.forEach(s=>{
        const sEl=getEl(s.id);
        const from=cardTop(s.id);
        const downEl=getEl('down');
        const to={x:downEl.offsetLeft+downEl.offsetWidth*0.7, y:downEl.offsetTop+downEl.offsetHeight};
        const path=document.createElementNS(NS,'path');
        path.setAttribute('d',`M${from.x} ${from.y} C${from.x} ${from.y-20}, ${to.x} ${to.y+20}, ${to.x} ${to.y}`);
        path.setAttribute('class','flow');
        path.setAttribute('stroke',s.color);
        path.dataset.from=s.id;path.dataset.to='down';
        svg.appendChild(path);
        flowPaths.push(path);
    });
}

function hiRels(id){
    relPaths.forEach(p=>{
        if(p.dataset.from===id||p.dataset.to===id) p.classList.add('hi');
    });
    relLabels.forEach(l=>{
        if(l.dataset.from===id||l.dataset.to===id) l.classList.add('hi');
    });
    flowPaths.forEach(p=>{
        if(p.dataset.from===id||p.dataset.to===id) p.classList.add('hi');
    });
    flowLabelsEls.forEach(l=>{
        if(l.dataset.from===id||l.dataset.to===id) l.classList.add('hi');
    });
}
function loRels(){
    relPaths.forEach(p=>p.classList.remove('hi'));
    relLabels.forEach(l=>l.classList.remove('hi'));
    flowPaths.forEach(p=>p.classList.remove('hi'));
    flowLabelsEls.forEach(l=>l.classList.remove('hi'));
}

function toggleTheme(){
    const root=document.documentElement;
    root.classList.toggle('dark');
    const btn=document.querySelector('.theme-btn');
    if(root.classList.contains('dark')){btn.textContent='☀️ 亮色';}
    else{btn.textContent='🌙 暗色';}
}

setTimeout(drawAll,60);
window.addEventListener('resize',()=>setTimeout(drawAll,60));
</script>
